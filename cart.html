<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your cart — AZURA</title>
  <meta name="description" content="Review your shopping cart." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>
  <main class="container-xl">
<div id="cartRoot" class="my-4"></div>  </main>
  <div id="site-footer"></div>
  <div id="site-mobile-nav"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
mountShell('cart');
function renderCart() {
  const cart = Store.getCart();
  const root = document.getElementById('cartRoot');
  if (cart.length === 0) {
    root.innerHTML = `<div class="empty-state"><h2>Your cart is empty</h2><p>Browse the catalog and find your next favorite gadget.</p><a href="shop.html" class="btn-primary-az mt-3">Start shopping</a></div>`;
    return;
  }
  const items = cart.map(c => ({ ...c, p: getProduct(c.id) })).filter(i=>i.p);
  const subtotal = items.reduce((s,i)=>s+i.p.price*i.qty, 0);
  const shipping = subtotal > 50 || subtotal === 0 ? 0 : 9.99;
  const total = subtotal + shipping;
  root.innerHTML = `
    <h1 class="mb-4">Your cart</h1>
    <div class="row g-4">
      <div class="col-lg-8">
        ${items.map(i => `
          <div class="cart-item mb-3">
            <a href="product.html?id=${i.p.id}" class="ci-img"><img src="${i.p.image}" alt="${i.p.name}"></a>
            <div class="flex-grow-1 d-flex flex-column">
              <div class="d-flex justify-content-between">
                <div>
                  <div class="small text-uppercase text-muted">${i.p.brand}</div>
                  <a href="product.html?id=${i.p.id}" class="fw-semibold">${i.p.name}</a>
                </div>
                <button class="btn-ghost-az text-muted" onclick="Store.removeFromCart('${i.p.id}'); renderCart();" aria-label="Remove"><i class="bi bi-trash"></i></button>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-auto">
                <div class="qty-control">
                  <button onclick="Store.setQty('${i.p.id}', ${i.qty-1}); renderCart();">−</button>
                  <span>${i.qty}</span>
                  <button onclick="Store.setQty('${i.p.id}', ${i.qty+1}); renderCart();">+</button>
                </div>
                <div class="fw-bold">$${(i.p.price*i.qty).toFixed(2)}</div>
              </div>
            </div>
          </div>`).join('')}
      </div>
      <div class="col-lg-4">
        <div class="summary-card">
          <h3>Order summary</h3>
          <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping===0?'Free':'$'+shipping.toFixed(2)}</span></div>
          <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          <a href="checkout.html" class="btn-primary-az w-100 mt-3">Checkout</a>
          <a href="shop.html" class="btn-ghost-az w-100 mt-2">Continue shopping</a>
        </div>
      </div>
    </div>`;
}
renderCart();
</script>
</body>
</html>
