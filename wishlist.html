<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wishlist — AZURA</title>
    <meta name="description" content="Your saved AZURA products." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="container-xl">
      <div id="wishRoot" class="my-4"></div>
    </main>
    <div id="site-footer"></div>
    <div id="site-mobile-nav"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
      mountShell("wishlist");
      function renderWish() {
        const ids = Store.getWishlist();
        const root = document.getElementById("wishRoot");
        if (!ids.length) {
          root.innerHTML = `<div class="empty-state"><h2>Your wishlist is empty</h2><p>Tap the heart on any product to save it for later.</p><a href="shop.html" class="btn-primary-az mt-3">Browse products</a></div>`;
          return;
        }
        const list = ids.map(getProduct).filter(Boolean);
        root.innerHTML = `<h1 class="mb-4">Wishlist <span class="text-muted small">(${list.length})</span></h1>
    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-4 g-3">${list.map(productCardHtml).join("")}</div>`;
      }
      renderWish();
    </script>
  </body>
</html>
