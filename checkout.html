<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout — AZURA</title>
    <meta name="description" content="Complete your order securely." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="container-xl">
      <div id="coRoot" class="my-4"></div>
    </main>
    <div id="site-footer"></div>
    <div id="site-mobile-nav"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
      mountShell("cart");
      function renderCheckout() {
        const cart = Store.getCart();
        const root = document.getElementById("coRoot");
        if (!cart.length) {
          root.innerHTML = `<div class="empty-state"><h2>Your cart is empty</h2><a href="shop.html" class="btn-primary-az mt-3">Shop now</a></div>`;
          return;
        }
        const items = cart
          .map((c) => ({ ...c, p: getProduct(c.id) }))
          .filter((i) => i.p);
        const subtotal = items.reduce((s, i) => s + i.p.price * i.qty, 0);
        const shipping = subtotal > 50 ? 0 : 9.99;
        const total = subtotal + shipping;
        root.innerHTML = `
    <h1 class="mb-4">Checkout</h1>
    <form id="coForm" class="row g-4">
      <div class="col-lg-8">
        <div class="filter-card mb-3">
          <h3 class="mb-3">Shipping details</h3>
          <div class="row g-3">
            <div class="col-md-6"><input class="input-az" placeholder="Full name" required></div>
            <div class="col-md-6"><input class="input-az" type="email" placeholder="Email" required></div>
            <div class="col-12"><input class="input-az" placeholder="Address" required></div>
            <div class="col-md-6"><input class="input-az" placeholder="City" required></div>
            <div class="col-md-6"><input class="input-az" placeholder="ZIP / Postal code" required></div>
          </div>
        </div>
        <div class="filter-card">
          <h3 class="mb-3">Payment</h3>
          <input class="input-az mb-3" placeholder="Card number" required>
          <div class="row g-3">
            <div class="col-6"><input class="input-az" placeholder="MM / YY" required></div>
            <div class="col-6"><input class="input-az" placeholder="CVC" required></div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="summary-card">
          <h3>Order summary</h3>
          ${items.map((i) => `<div class="summary-row"><span>${i.p.name} × ${i.qty}</span><span>$${(i.p.price * i.qty).toFixed(2)}</span></div>`).join("")}
          <div class="summary-row" style="border-top:1px solid var(--border); padding-top:.85rem; margin-top:.85rem;"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${shipping === 0 ? "Free" : "$" + shipping.toFixed(2)}</span></div>
          <div class="summary-row total"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          <button type="submit" class="btn-primary-az w-100 mt-3">Place order</button>
        </div>
      </div>
    </form>`;
        document.getElementById("coForm").addEventListener("submit", (e) => {
          e.preventDefault();
          Store.clearCart();
          document.getElementById("coRoot").innerHTML = `
      <div class="empty-state">
        <i class="bi bi-check-circle-fill" style="font-size:4rem; color:var(--brand);"></i>
        <h2 class="mt-3">Order placed!</h2>
        <p>Thanks for shopping with AZURA. A confirmation has been sent to your email.</p>
        <a href="index.html" class="btn-primary-az mt-3">Back to home</a>
      </div>`;
        });
      }
      renderCheckout();
    </script>
  </body>
</html>
