<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shop — AZURA</title>
    <meta
      name="description"
      content="Browse all AZURA electronics with filters and sorting."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div id="site-header"></div>
    <main class="container-xl">
      <div
        class="d-flex flex-wrap align-items-end justify-content-between gap-3 mt-4 mb-4"
      >
        <div>
          <h1 class="mb-1" id="shopTitle">All Products</h1>
          <p class="text-muted mb-0" id="shopCount"></p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <button
            class="btn-outline-az d-lg-none"
            data-bs-toggle="offcanvas"
            data-bs-target="#filtersDrawer"
          >
            <i class="bi bi-sliders"></i> Filters
          </button>
          <select
            id="sortSel"
            class="form-select"
            style="border-radius: 999px; max-width: 200px"
          >
            <option value="popular">Most popular</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
          </select>
        </div>
      </div>
      <div class="row g-4">
        <aside class="col-lg-3 d-none d-lg-block">
          <div class="filter-card" id="filterPanel"></div>
        </aside>
        <div class="col-lg-9">
          <div class="row row-cols-2 row-cols-md-3 g-3" id="shopGrid"></div>
          <div id="shopEmpty" class="empty-state" style="display: none">
            <h2>No products match</h2>
            <p>Try adjusting your filters or search.</p>
          </div>
        </div>
      </div>
      <div
        class="offcanvas offcanvas-bottom"
        tabindex="-1"
        id="filtersDrawer"
        style="height: 80vh; border-radius: 24px 24px 0 0"
      >
        <div class="offcanvas-header">
          <h5>Filters</h5>
          <button class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
          <div class="filter-card" id="filterPanelMobile"></div>
        </div>
      </div>
    </main>
    <div id="site-footer"></div>
    <div id="site-mobile-nav"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
      mountShell("shop");
      const params = new URLSearchParams(location.search);
      const initialQ = params.get("q") || "";
      const initialCat = params.get("cat") || "";
      const state = {
        q: initialQ,
        cat: initialCat,
        maxPrice: 1500,
        brands: [],
        minRating: 0,
        sort: "popular",
      };

      if (state.cat) {
        document.getElementById("shopTitle").textContent = state.cat;
      } else if (state.q) {
        document.getElementById("shopTitle").textContent =
          `Results for "${state.q}"`;
      }

      const allBrands = [...new Set(PRODUCTS.map((p) => p.brand))];
      function buildFilterPanel(target) {
        target.innerHTML = `
    <h5>Price</h5>
    <input type="range" min="20" max="1500" step="20" value="${state.maxPrice}" class="form-range" id="r_${target.id}_price" />
    <div class="range-display">Up to $<span data-pricelbl>${state.maxPrice}</span></div>
    <h5>Brand</h5>
    ${allBrands
      .map(
        (b) => `
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="${b}" id="b_${target.id}_${b}" ${state.brands.includes(b) ? "checked" : ""}>
        <label class="form-check-label" for="b_${target.id}_${b}">${b}</label>
      </div>`,
      )
      .join("")}
    <h5>Rating</h5>
    <div class="d-flex flex-wrap gap-2">
      ${[0, 4, 4.5].map((r) => `<button data-rating="${r}" class="btn-outline-az ${state.minRating === r ? "active" : ""}" style="padding:.35rem .8rem; font-size:.78rem;">${r === 0 ? "Any" : r + "★ & up"}</button>`).join("")}
    </div>`;
        target
          .querySelector(`#r_${target.id}_price`)
          .addEventListener("input", (e) => {
            state.maxPrice = +e.target.value;
            document
              .querySelectorAll("[data-pricelbl]")
              .forEach((el) => (el.textContent = state.maxPrice));
            render();
          });
        target.querySelectorAll("input[type=checkbox]").forEach((cb) => {
          cb.addEventListener("change", () => {
            state.brands = [
              ...target.querySelectorAll("input[type=checkbox]:checked"),
            ].map((x) => x.value);
            render();
          });
        });
        target.querySelectorAll("[data-rating]").forEach((b) => {
          b.addEventListener("click", () => {
            state.minRating = +b.dataset.rating;
            render();
          });
        });
      }
      buildFilterPanel(document.getElementById("filterPanel"));
      buildFilterPanel(document.getElementById("filterPanelMobile"));

      document.getElementById("sortSel").addEventListener("change", (e) => {
        state.sort = e.target.value;
        render();
      });

      function render() {
        let list = PRODUCTS.filter(
          (p) => p.price <= state.maxPrice && p.rating >= state.minRating,
        );
        if (state.brands.length)
          list = list.filter((p) => state.brands.includes(p.brand));
        if (state.cat) list = list.filter((p) => p.category === state.cat);
        if (state.q) {
          const q = state.q.toLowerCase();
          list = list.filter(
            (p) =>
              p.name.toLowerCase().includes(q) ||
              p.brand.toLowerCase().includes(q),
          );
        }
        if (state.sort === "price-asc") list.sort((a, b) => a.price - b.price);
        else if (state.sort === "price-desc")
          list.sort((a, b) => b.price - a.price);
        else list.sort((a, b) => b.reviews - a.reviews);

        document.getElementById("shopCount").textContent =
          list.length + " items" + (state.q ? ` for "${state.q}"` : "");
        const grid = document.getElementById("shopGrid");
        grid.innerHTML = list.map(productCardHtml).join("");
        document.getElementById("shopEmpty").style.display = list.length
          ? "none"
          : "block";
      }
      render();
    </script>
  </body>
</html>
